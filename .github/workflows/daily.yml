name: Daily AI News

on:
  schedule:
    # 每天 8:00 北京时间 = UTC 0:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
          AGNES_API_BASE: ${{ secrets.AGNES_API_BASE }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          DAILY_TOP_N: 15
          DAILY_WECHAT_TOP_N: 5
          DAILY_RSS_TIMEOUT: 30
          DAILY_LLM_TIMEOUT: 30
          WECHAT_COVER_IMAGE_PATH: ${{ secrets.WECHAT_COVER_IMAGE_PATH }}
        run: python -m src.main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
